$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive
bind = $mainMod, M, exec, hyprctl dispatch exit
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, R, exec, pkill waybar || waybar &
bind = $mainMod+SHIFT, R, exec, hyprcap rec monitor DP-1
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, F, fullscreen, 1
bind = ALT, Tab, cyclenext
bind = $mainMod, T, exec, ~/.config/rofi/rofi-theme-switcher.sh -theme ~/.config/rofi/rofi-theme-switcher.rasi
bind = Ctrl+ALT, Delete, exec, ~/.config/rofi/powermenu.sh
bind = $mainMod, G, exec, ghostty
bind = $mainMod, P, pseudo
bind = $mainMod+SHIFT, S, exec, hyprshot -m region
bind = $mainMod+SHIFT, T, exec, ~/.config/rofi/wallpaper-picker.sh


# Switch to workspace 1–10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace 1–10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5% && notify-send "Brightness: $(brightnessctl -m | cut -d, -f4)"
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send "Brightness: $(brightnessctl -m | cut -d, -f4)"

# Volume controls
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle



# Optional mic mute (if you want it)
# bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Playback (requires playerctl)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

bindm = SUPER, mouse:272, movewindow

